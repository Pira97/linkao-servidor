; ============================================================
;  BATTLE PASS - Temporada 1 "Amanecer"  (10 niveles)
;  Tags de recompensa:
;    ORO:n              -> oro
;    OBJ:idx:cant       -> entrega item del obj.dat
;    AURA_ITEM:idx      -> entrega item cosmetico con aura
;    MOUNT:idx          -> entrega montura (ObjType 44)
;    PART:id            -> particula cosmetica (pendiente de mapear ids)
;    BOOST_EXP:%:min    -> multiplicador exp personal temporal
;    BOOST_ORO:%:min    -> multiplicador oro personal temporal
;    TITULO:texto       -> titulo sobre el nick
; ============================================================

[SEASON]
Id=2
Nombre=Temporada 1 - Amanecer
Inicio=2026-07-01
Fin=2026-08-01
NivelesMax=10
PuntosPorNivel=100
PrecioCredito=500
PrecioMercadoPago=300

; Puntos por matar NPCs SEGUN DIFICULTAD (por MaxHP). Los bichos triviales no suman:
; solo matar criaturas fuertes/jefes hace avanzar el pase.
;   Trivial: HP < 500     (hormigas, murcielagos, lobos)   -> 0
;   Debil:   HP 500-5000                                    -> 1
;   Normal:  HP 5000-20000                                  -> 3
;   Fuerte:  HP 20000-50000 (desertores, demonios, golems)  -> 10
;   Elite:   HP 50000-150000 (yetis, golems oro, dragones)  -> 25
;   Boss:    HP 150000-500000 (golem infernal/hielo, garveloth) -> 60
;   Raid:    HP > 500000 (dragon legendario, rey dragon, grinch) -> 150
[PUNTOS]
NpcTrivial=0
NpcDebil=1
NpcNormal=3
NpcFuerte=10
NpcElite=25
NpcBoss=60
NpcRaid=150
PorSubirNivel=0
PorTrabajo=0
PorPvp=0
PorEvento=0

; ============================================================
;  MISIONES (objetivos concretos con contador). Al completarse dan Puntos.
;  Tipo:
;    npc    -> matar una criatura. Target = nombre (coincidencia parcial) o NpcIndex numerico.
;    tier   -> matar cualquier criatura con MaxHP >= TargetHP.
;    trabajo-> acciones de trabajo (pesca/mineria/tala/botanica).
;    pvp    -> matar jugadores.
;  Objetivo = cantidad necesaria. Puntos = puntos de pase al completar.
; ============================================================
[MISION1]
Desc=Caza de lobos
Tipo=npc
Target=Lobo
Objetivo=10
Puntos=20

[MISION2]
Desc=Cazador de Yetis
Tipo=npc
Target=Yeti
Objetivo=3
Puntos=40

[MISION3]
